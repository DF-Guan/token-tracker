[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "token-tracker"
version = "0.2.1"
description = "Track token usage across local AI agents (Claude Code, Codex)"
requires-python = ">=3.11"
dependencies = [
    "rich>=13.7",
]

[project.scripts]
tt = "src.cli:main"

[tool.setuptools.packages.find]
include = ["src*"]
